name: Recover Submission

on:
  workflow_dispatch:
    inputs:
      unique_name:
        description: 'Override unique name (leave blank to auto-generate from owner+timestamp)'
        required: false
        default: ''

jobs:
  recover:
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check output directory from failed run
        run: |
          echo "=== Checking output/ directory ==="
          if [ ! -d "output" ]; then
            echo "Error: output/ directory does not exist."
            echo "The failed run may have been cleaned up already."
            exit 1
          fi
          ls -la output/
          if [ ! -f "output/results.json" ]; then
            echo "Error: output/results.json not found"
            exit 1
          fi
          if [ ! -f "output/provenance.json" ]; then
            echo "Error: output/provenance.json not found"
            exit 1
          fi
          echo "output/results.json and output/provenance.json found."

      - name: Determine unique name
        id: naming
        run: |
          if [ -n "${{ github.event.inputs.unique_name }}" ]; then
            UNIQUE_NAME="${{ github.event.inputs.unique_name }}"
            echo "Using provided unique name: $UNIQUE_NAME"
          else
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            UNIQUE_NAME="${{ github.repository_owner }}-${TIMESTAMP}"
            echo "Auto-generated unique name: $UNIQUE_NAME"
          fi

          BRANCH="submission-${UNIQUE_NAME}"
          echo "unique_name=$UNIQUE_NAME" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Copy output files into submission paths
        run: |
          UNIQUE_NAME="${{ steps.naming.outputs.unique_name }}"

          cp output/results.json results/${UNIQUE_NAME}.json
          cp output/provenance.json submissions/${UNIQUE_NAME}.provenance.json

          # scenario.toml should already be in the repo root
          if [ ! -f "scenario.toml" ]; then
            echo "Error: scenario.toml not found in repo root"
            exit 1
          fi
          cp scenario.toml submissions/${UNIQUE_NAME}.toml

          echo "Files staged:"
          echo "  results/${UNIQUE_NAME}.json"
          echo "  submissions/${UNIQUE_NAME}.toml"
          echo "  submissions/${UNIQUE_NAME}.provenance.json"

      - name: Determine target repository
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PARENT_REPO=$(gh api repos/${{ github.repository }} \
            --jq '.parent.full_name // "${{ github.repository }}"' 2>/dev/null \
            || echo "${{ github.repository }}")
          echo "Target repository: $PARENT_REPO"
          echo "repo=$PARENT_REPO" >> $GITHUB_OUTPUT

      - name: Create submission branch from upstream main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/${{ steps.target.outputs.repo }}.git \
            || git remote set-url upstream https://github.com/${{ steps.target.outputs.repo }}.git
          git fetch upstream

          git checkout -b ${{ steps.naming.outputs.branch_name }} upstream/main

      - name: Commit result files onto submission branch
        run: |
          UNIQUE_NAME="${{ steps.naming.outputs.unique_name }}"

          git add results/${UNIQUE_NAME}.json \
                  submissions/${UNIQUE_NAME}.toml \
                  submissions/${UNIQUE_NAME}.provenance.json

          git commit -m "Submission: ${UNIQUE_NAME}

          Recovered via manual workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Push submission branch to fork
        run: |
          git push origin ${{ steps.naming.outputs.branch_name }}

      - name: Output PR link
        run: |
          echo "### ✅ Submission Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Unique name:** ${{ steps.naming.outputs.unique_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ steps.naming.outputs.branch_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[👉 Click here to open a Pull Request](https://github.com/${{ steps.target.outputs.repo }}/compare/main...${{ github.repository_owner }}:${{ github.event.repository.name }}:${{ steps.naming.outputs.branch_name }}?expand=1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ When creating the PR, **UNCHECK** 'Allow edits and access to secrets by maintainers' to protect your secrets." >> $GITHUB_STEP_SUMMARY
